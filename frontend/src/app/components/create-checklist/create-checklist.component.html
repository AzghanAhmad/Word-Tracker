<div class="create-checklist-container">
    <div class="header">
        <h1>{{ isEditMode ? 'Edit Checklist' : 'Create a Checklist' }}</h1>
        <p class="subtitle">{{ isEditMode ? 'Update your checklist tasks' : 'Build a task list to keep your writing
            project organized' }}</p>
    </div>

    <!-- Loading State -->
    <div class="loading-state" *ngIf="isLoadingData && isEditMode">
        <i class="fas fa-spinner fa-spin"></i> Loading checklist...
    </div>

    <div class="checklist-form" *ngIf="!isLoadingData || !isEditMode">
        <!-- Checklist Name -->
        <div class="form-group">
            <label for="checklistName">Checklist Name</label>
            <input type="text" id="checklistName" [(ngModel)]="checklistName" class="form-input"
                placeholder="e.g., NaNoWriMo Tasks, Research Checklist" required [disabled]="isLoadingData">
        </div>

        <!-- Checklist Configuration -->
        <div class="config-section">
            <h3>Checklist Configuration</h3>
            
            <div class="form-row">
                <div class="form-group half">
                    <label for="activityType">Activity</label>
                    <select id="activityType" [(ngModel)]="activityType" class="form-select" [disabled]="isLoadingData">
                        <option *ngFor="let act of activities" [value]="act">{{ act }}</option>
                    </select>
                </div>
                <div class="form-group half">
                    <label for="contentType">Content Type</label>
                    <select id="contentType" [(ngModel)]="contentType" class="form-select" [disabled]="isLoadingData">
                        <option *ngFor="let type of contentTypes" [value]="type">{{ type }}</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group half">
                    <label for="startDate">Start Date</label>
                    <input type="date" id="startDate" [(ngModel)]="startDate" class="form-input" [disabled]="isLoadingData">
                </div>
                <div class="form-group half">
                    <label for="endDate">Target Finish Date</label>
                    <input type="date" id="endDate" [(ngModel)]="endDate" class="form-input" [disabled]="isLoadingData">
                </div>
            </div>

            <div class="form-group">
                <label for="algorithmType">Strategy</label>
                <select id="algorithmType" [(ngModel)]="algorithmType" class="form-select" [disabled]="isLoadingData">
                    <option *ngFor="let strat of strategies" [value]="strat.id">{{ strat.label }}</option>
                </select>
            </div>
        </div>

        <!-- Checklist Items -->
        <div class="items-section">
            <h3>Tasks</h3>
            <div class="items-list">
                <div class="item-row" *ngFor="let item of items; let i = index">
                    <div class="item-checkbox" (click)="toggleItemStatus(item)">
                        <i class="check-icon"
                            [ngClass]="item.checked ? 'fa-solid fa-square-check' : 'fa-regular fa-square'"></i>
                    </div>
                    <div class="item-text">
                        <input type="text" [(ngModel)]="item.text" class="item-input"
                            placeholder="Enter task description" [disabled]="isLoadingData">
                        <div class="item-date-picker">
                            <label><i class="far fa-calendar-alt"></i> Date:</label>
                            <input type="date" [(ngModel)]="item.date" [min]="startDate" [max]="endDate" class="item-date-input" [disabled]="isLoadingData">
                        </div>
                    </div>
                    <div class="item-actions">
                        <button type="button" class="btn-icon" (click)="moveUp(i)" [disabled]="i === 0 || isLoadingData"
                            title="Move up">
                            ↑
                        </button>
                        <button type="button" class="btn-icon" (click)="moveDown(i)"
                            [disabled]="i === items.length - 1 || isLoadingData" title="Move down">
                            ↓
                        </button>
                        <button type="button" class="btn-icon btn-delete" (click)="removeItem(i)"
                            [disabled]="items.length === 1 || isLoadingData" title="Delete">
                            ×
                        </button>
                    </div>
                </div>
            </div>

            <button type="button" class="btn-add-item" (click)="addItem()" [disabled]="isLoadingData">
                + Add Task
            </button>
        </div>

        <!-- Actions -->
        <div class="form-actions">
            <button type="button" class="btn-secondary" routerLink="/my-checklists"
                [disabled]="isLoadingData">Cancel</button>
            <button type="button" class="btn-primary" (click)="saveChecklist()" [disabled]="isLoading || isLoadingData">
                <span *ngIf="isLoading"><i class="fas fa-spinner fa-spin"></i> Saving...</span>
                <span *ngIf="!isLoading">{{ isEditMode ? 'Update Checklist' : 'Save Checklist' }}</span>
            </button>
        </div>
    </div>
</div>
